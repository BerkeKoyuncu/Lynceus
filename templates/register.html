{% extends "base.html" %}

{% block content %}

<div class="auth-panel">
    <div style="text-align: center; margin-bottom: 24px;">
        <img src="{{ url_for('static', filename='images/logos/Lynceus-logo-dark-green.svg') }}" class="logo-light-theme" alt="Lynceus Logo"
            style="height: 250px; max-width: 100%;">
        <img src="{{ url_for('static', filename='images/logos/Lynceus-logo-beige.svg') }}" class="logo-dark-theme" alt="Lynceus Logo"
            style="height: 250px; max-width: 100%;">
    </div>
    <h2>Register</h2>

    <form method="POST">
        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <div class="password-field">
            <input type="password" id="password" name="password" required>
            <button type="button" class="password-toggle" onclick="togglePasswordGroup(this)"
                aria-label="Show or hide password">
                <i data-lucide="eye"></i>
            </button>
        </div>

        <label>Confirm Password</label>
        <div class="password-field">
            <input type="password" id="confirm_password" name="confirm_password" required>
            <button type="button" class="password-toggle" onclick="togglePasswordGroup(this)"
                aria-label="Show or hide password">
                <i data-lucide="eye"></i>
            </button>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="auth-flash-wrapper">
            {% for category, message in messages %}
            <div class="flash-message {{ category }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <button type="submit">Register</button>
    </form>

    <p class="auth-switch">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </p>
</div>

<script>
    function togglePasswordGroup(button) {
        const field = button.closest(".password-field");
        const input = field.querySelector("input");

        if (input.type === "password") {
            input.type = "text";
            button.innerHTML = '<i data-lucide="eye-off"></i>';
        } else {
            input.type = "password";
            button.innerHTML = '<i data-lucide="eye"></i>';
        }
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    }
</script>

{% endblock %}
